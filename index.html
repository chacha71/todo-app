<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办事项</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #0c0c10;
    color: #ece8e1;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container {
    max-width: 520px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date {
    font-size: 13px;
    color: #8a857e;
    margin-bottom: 24px;
  }

  /* ── 新增输入 ────────────────────────── */
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .add-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #16161f;
    color: #ece8e1;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .add-row input:focus { border-color: rgba(78,205,196,0.3); }
  .add-row input::placeholder { color: #5a5650; }
  .add-row button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #4ecdc4;
    color: #0c0c10;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .add-row button:active { opacity: 0.7; }

  /* ── 分组 ──────────────────────────── */
  .group { margin-bottom: 20px; }
  .group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    margin-bottom: 4px;
  }
  .group-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: #8a857e;
    letter-spacing: 0.5px;
  }
  .group-header .count {
    font-size: 12px;
    color: #5a5650;
    background: rgba(255,255,255,0.05);
    padding: 1px 8px;
    border-radius: 10px;
  }
  .group-header .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 600;
  }
  .tag-tomorrow { background: rgba(255,107,53,0.15); color: #ff6b35; }
  .tag-week { background: rgba(78,205,196,0.12); color: #4ecdc4; }
  .tag-long { background: rgba(160,120,255,0.12); color: #a078ff; }

  /* ── 待办项 ────────────────────────── */
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background 0.2s;
    cursor: pointer;
  }
  .todo-item:hover { background: rgba(255,255,255,0.03); }

  .todo-item input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border: 2px solid #5a5650;
    border-radius: 5px;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 1px;
    transition: all 0.2s;
    position: relative;
  }
  .todo-item input[type="checkbox"]:checked {
    background: #4ecdc4;
    border-color: #4ecdc4;
  }
  .todo-item input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0c0c10;
    font-size: 12px;
    font-weight: 700;
  }

  .todo-item .text {
    flex: 1;
    font-size: 14px;
    line-height: 1.6;
    transition: color 0.2s, text-decoration 0.2s;
  }
  .todo-item.done .text {
    color: #5a5650;
    text-decoration: line-through;
  }

  .todo-item .del {
    width: 22px; height: 22px;
    border: none;
    background: transparent;
    color: #5a5650;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    transition: all 0.2s;
  }
  .todo-item:hover .del { opacity: 1; }
  .todo-item .del:hover { background: rgba(255,77,77,0.15); color: #ff5c5c; }

  /* ── 空状态 ────────────────────────── */
  .empty {
    text-align: center;
    padding: 32px 0;
    color: #5a5650;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>☑ 待办事项</h1>
  <div class="date" id="dateDisplay"></div>

  <!-- 新增输入 -->
  <div class="add-row">
    <input id="newTodoInput" placeholder="添加新待办…" maxlength="200">
    <button id="addTodoBtn">添加</button>
  </div>

  <!-- 待办列表容器 -->
  <div id="todoGroups"></div>
</div>

<script>
// ── 预置任务 ──────────────────────────────
const DEFAULT_TODOS = [
  { text: '把 Work Buddy 上和大作业相关的内容迁移到 Claude Code 上', group: 'tomorrow' },
  { text: '开始做大作业', group: 'tomorrow' },
  { text: '写手写作业', group: 'tomorrow' },
  { text: '刷完形势与政策课', group: 'week' },
  { text: '改简历、投简历', group: 'long' },
  { text: '💡 语音输入：改用手机自带输入法语音转文字，比 Web Speech API 更准', group: 'tomorrow' },
];

const GROUP_LABELS = {
  tomorrow: { title: '今天 · 5月12日 周二', tag: '今天', tagClass: 'tag-tomorrow' },
  week:     { title: '本周内',              tag: '本周', tagClass: 'tag-week' },
  long:     { title: '长期',                tag: '长期', tagClass: 'tag-long' },
};
const GROUP_ORDER = ['tomorrow', 'week', 'long'];

// ── 数据 ──────────────────────────────────
let todos = [];

function load() {
  try {
    const raw = localStorage.getItem('todos');
    if (raw) todos = JSON.parse(raw);
  } catch (_) {}
  if (!todos.length) {
    todos = DEFAULT_TODOS.map(t => ({ ...t, id: Date.now() + Math.random(), done: false }));
  }
}

function save() {
  localStorage.setItem('todos', JSON.stringify(todos));
}

// ── 渲染 ──────────────────────────────────
function render() {
  const container = document.getElementById('todoGroups');

  // 统计各分组未完成数
  const counts = {};
  const grouped = {};
  for (const g of GROUP_ORDER) {
    grouped[g] = todos.filter(t => t.group === g);
    counts[g] = grouped[g].filter(t => !t.done).length;
  }

  let html = '';
  for (const g of GROUP_ORDER) {
    const items = grouped[g];
    const info = GROUP_LABELS[g];
    html += `<div class="group">`;
    html += `<div class="group-header">`;
    html += `<h2>${info.title}</h2>`;
    html += `<span class="count">剩 ${counts[g]} 项</span>`;
    html += `</div>`;

    if (items.length === 0) {
      html += `<div class="empty">✨ 全部完成！</div>`;
    } else {
      for (const item of items) {
        html += `<div class="todo-item${item.done ? ' done' : ''}" data-id="${item.id}">`;
        html += `<input type="checkbox"${item.done ? ' checked' : ''}>`;
        html += `<span class="text">${escapeHtml(item.text)}</span>`;
        html += `<button class="del">✕</button>`;
        html += `</div>`;
      }
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── 事件绑定 ──────────────────────────────
function getGroupOrder() {
  // 新增任务时自动分类：包含"简历""投"的归长期，其他归明天
  // 交给用户通过界面选择
  return 'tomorrow'; // default
}

document.getElementById('todoGroups').addEventListener('click', (e) => {
  const itemDiv = e.target.closest('.todo-item');
  if (!itemDiv) return;
  const id = parseFloat(itemDiv.dataset.id);

  if (e.target.tagName === 'BUTTON' || e.target.classList.contains('del')) {
    // 删除
    todos = todos.filter(t => t.id !== id);
    save();
    render();
    return;
  }

  if (e.target.tagName === 'INPUT' || e.target.closest('.todo-item')) {
    // 切换完成状态
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.done = !todo.done;
      save();
      render();
    }
  }
});

document.getElementById('addTodoBtn').addEventListener('click', addTodo);
document.getElementById('newTodoInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addTodo();
});

function addTodo() {
  const input = document.getElementById('newTodoInput');
  const text = input.value.trim();
  if (!text) return;
  todos.push({ id: Date.now() + Math.random(), text, group: 'tomorrow', done: false });
  save();
  render();
  input.value = '';
}

// ── 显示日期 ──────────────────────────────
const weekNames = ['日', '一', '二', '三', '四', '五', '六'];
const now = new Date();
const y = now.getFullYear();
const m = now.getMonth() + 1;
const d = now.getDate();
const w = weekNames[now.getDay()];
document.getElementById('dateDisplay').textContent = `${y}年${m}月${d}日 周${w}`;

// ── 启动 ──────────────────────────────────
load();
render();
</script>
</body>
</html>
